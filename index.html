<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="STT Notes">
  <title>STT Notes</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Settings Screen -->
  <section id="screen-settings" class="screen">
    <div class="screen-inner">
      <h1>Setup</h1>
      <p class="muted">Connect to your NextCloud tasks calendar</p>

      <form id="form-settings">
        <div class="field">
          <label for="input-url">CalDAV Tasks URL</label>
          <input id="input-url" type="url" required
            placeholder="https://cloud.example.com/remote.php/dav/calendars/alice/tasks/">
          <span class="hint">NextCloud &rarr; Settings &rarr; General &rarr; Primary CalDAV address, then append your tasks calendar name</span>
        </div>

        <div class="field">
          <label for="input-username">Username</label>
          <input id="input-username" type="text" required autocomplete="off"
            autocapitalize="none" autocorrect="off" spellcheck="false"
            data-lpignore="true" data-1p-ignore data-bwignore placeholder="alice">
        </div>

        <div class="field">
          <label for="input-password">App Password</label>
          <div class="password-row">
            <input id="input-password" type="password" required autocomplete="new-password"
              autocapitalize="none" autocorrect="off" spellcheck="false"
              data-lpignore="true" data-1p-ignore data-bwignore
              placeholder="xxxx-xxxx-xxxx-xxxx">
            <button type="button" id="btn-show-password" aria-label="Show password">&#128065;</button>
          </div>
          <span class="hint">Use a NextCloud <strong>App Password</strong> (Settings &rarr; Security), not your login password</span>
        </div>

        <div class="field">
          <label for="input-model">Whisper Model</label>
          <select id="input-model">
            <option value="onnx-community/whisper-tiny">Tiny &mdash; fast</option>
            <option value="onnx-community/whisper-base">Base &mdash; more accurate</option>
            <option value="onnx-community/whisper-small">Small &mdash; best quality</option>
          </select>
        </div>

        <div class="field">
          <label for="input-language">Language</label>
          <select id="input-language">
            <option value="auto">Auto-detect</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="ar">Arabic</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
          </select>
        </div>

        <div class="btn-row">
          <button type="button" id="btn-test" class="btn-secondary">Test Connection</button>
          <button type="submit" class="btn-primary">Save &amp; Continue</button>
        </div>
      </form>
    </div>
  </section>

  <!-- Main Screen -->
  <section id="screen-main" class="screen">
    <div class="screen-inner centered">
      <button id="btn-settings" class="btn-icon top-right" aria-label="Settings" title="Settings">&#9881;&#65039;</button>
      <button id="btn-install" class="btn-install" aria-label="Install app">Install App</button>

      <div id="model-progress" class="model-progress">
        <progress id="progress-bar" value="0" max="100"></progress>
        <span id="progress-label">Downloading Whisper model&hellip;</span>
      </div>

      <button id="btn-record" class="btn-record" disabled data-state="idle" aria-label="Record voice note">
        <span class="btn-record-icon" aria-hidden="true"></span>
      </button>
      <p id="record-label" class="record-label">Tap to Record</p>
    </div>
  </section>

  <!-- Review Screen -->
  <section id="screen-review" class="screen">
    <div class="screen-inner">
      <h2>Review</h2>
      <textarea id="textarea-review" rows="8" placeholder="Transcription will appear here&hellip;"></textarea>
      <div class="field">
        <label for="select-list">List</label>
        <select id="select-list"></select>
      </div>
      <div class="btn-row">
        <button id="btn-discard" class="btn-secondary">Discard</button>
        <button id="btn-save" class="btn-primary">Save to NextCloud</button>
      </div>
    </div>
  </section>

  <script type="module" src="./app.js"></script>
  <script>
    document.getElementById('btn-show-password').addEventListener('click', () => {
      const el = document.getElementById('input-password');
      el.type = el.type === 'password' ? 'text' : 'password';
    });
  </script>
</body>
</html>
